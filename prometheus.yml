global:
  scrape_interval:     30s
  external_labels:
    monitor: 'railway-prom'

scrape_configs:
  - job_name: 'prometheus'
    scrape_interval: 30s
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'click_house'
    scrape_interval: 30s
    scheme: https
    metrics_path: /metrics
    static_configs:
      - targets: ['x220-158-22-68.static.xvps.ne.jp']

  - job_name: 'postgres_metrics_collector'
    scrape_interval: 30s
    scheme: https
    metrics_path: /metrics
    static_configs:
      - targets: ['postgres-metrics-collector-staging.up.railway.app']

  - job_name: 'postgres-exporter'
    scrape_interval: 30s
    static_configs:
      - targets: ['postgres-exporter.railway.internal:9187']

  - job_name: 'match-id-collector'
    scrape_interval: 30s
    static_configs:
      - targets: ['lol-match-id-collector.railway.internal:9464']

  - job_name: 'match-detail-collector'
    scrape_interval: 30s
    scheme: http
    metrics_path: /metrics
    static_configs:
      - targets: ['x220-158-22-68.static.xvps.ne.jp:9090']

  - job_name: 'bff'
    scrape_interval: 30s
    scheme: https
    static_configs:
      - targets: ['lol-ai-ban-pick-bff-production.up.railway.app:8080']
